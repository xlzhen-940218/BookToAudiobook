# DeepSeek API配置
# 注意：API密钥建议配置在 api_keys.yaml 或环境变量 DEEPSEEK_API_KEY 中
deepseek:
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"

# 阿里百炼 (DashScope) 语音合成配置
# 注意：API密钥建议配置在 api_keys.yaml 或环境变量 DASHSCOPE_API_KEY 中
dashscope:
  # 可选模型: cosyvoice-v3-flash, cosyvoice-v3-plus, cosyvoice-v2, cosyvoice-v1
  model: "cosyvoice-v2"

# 语音合成配置
tts:
  # 默认旁白音色（推荐：longanyang 阳光男，longshu 沉稳男，longbaizhi 睿气女）
  narrator_voice: "longanyang"

  # 角色音色配置
  character_voices:
    # 默认兜底音色（如果所有分配策略都失败，使用此音色）
    default: "longanhuan"

    # 【手动强制指定】如果你发现AI推断错误，可以在这里直接写死某个角色的性别和年龄段
    # 例如：
    # character_genders:
    #   "村长": "male"
    #   "翠花": "female"
    character_genders: {}

    # 例如：
    # character_ages:
    #   "村长": "elderly"
    #   "狗蛋": "child"
    character_ages: {}

    # 是否开启随机音色分配（开启后将从下方的可用池中随机抽取对应属性的音色）
    random_assignment: true

    # ==========================
    # 按照年龄段和性别分类的音色池
    # ==========================

    # 1. 儿童音色池 (优先判断)
    child_voices:
      - "longhuhu"       # 天真烂漫女童 (6~10岁)
      - "longpaopao"     # 飞天泡泡音 (6~15岁)
      - "longjielidou"   # 阳光顽皮男童 (10岁)
      - "longxian"       # 豪放可爱女童 (12岁)
      - "longling"       # 稚气呆板女童 (10岁)
      - "longshanshan"   # 戏剧化童声 (6~15岁)
      - "longniuniu"     # 阳光男童声 (6~15岁)
      - "longwangwang"   # 台湾少年音 (v2特有)
      - "longke"         # 懵懂乖乖女 (v2特有)

    # 2. 老年音色池 (优先判断)
    elderly_voices:
      - "longlaobo"      # 沧桑岁月大爷 (60岁以上)
      - "longlaoyi"      # 烟火从容阿姨 (60岁以上)
      - "longgaoseng"    # 得道高僧音 (v2特有)

    # 3. 成年男性音色池
    male_voices:
      - "longshu"        # 沉稳青年男
      - "longyichen"     # 洒脱活力男
      - "longzhe"        # 呆板大暖男
      - "longze"         # 温暖元气男
      - "longcheng"      # 智慧青年男
      - "longtian"       # 磁性理智男
      - "longhao"        # 多情忧郁男
      - "longhan"        # 温暖痴情男
      - "longanzhi"      # 睿智轻熟男
      - "longxiu"        # 博才说书男
      - "longnan"        # 睿智青年男
      - "longshuo"       # 博才干练男
      - "longfei"        # 热血磁性男
      - "longanshuo"     # 干净清爽男 (v2特有)
      - "longxiaocheng"  # 磁性低音男 (v2特有)
      - "longshao"       # 积极向上男 (v2特有)
      - "longjin"        # 优雅温润男 (v2特有)
      - "libai"          # 古代诗仙男 (v2特有)

    # 4. 成年女性音色池
    female_voices:
      - "longanhuan"     # 欢脱元气女
      - "longxiaochun"   # 知性积极女
      - "longxiaoxia"    # 沉稳权威女
      - "longwanjun"     # 细腻柔声女
      - "longmiao"       # 抑扬顿挫女
      - "longyuan"       # 温暖治愈女
      - "longyue"        # 温暖磁性女
      - "longhua"        # 元气甜美女
      - "longyan"        # 温暖春风女
      - "longxing"       # 温婉邻家女
      - "longwan"        # 细腻柔声女
      - "longqiang"      # 浪漫风情女
      - "longfeifei"     # 甜美娇气女
      - "longanrou"      # 温柔闺蜜女
      - "longanling"     # 思维灵动女
      - "longanya"       # 高雅气质女
      - "longanqin"      # 亲和活泼女
      - "loongbella"     # 精准干练女
      - "longjixin"      # 毒舌心机女 (v2特有)
      - "longbaizhi"     # 睿气旁白女 (v2特有)
      - "loongstella"    # 飒爽利落女 (v2特有)

    # 5. 通用可用音色池 (当没有男/女/老/少分类匹配时，随机兜底)
    available_chinese_voices:
      - "longanhuan"
      - "longxiaochun"
      - "longshu"
      - "longyichen"
      - "longwanjun"
      - "longxiaoxia"

# 音频处理配置
audio:
  output_format: "mp3"
  sample_rate: 24000
  bitrate: "48k"
  temp_dir: "temp_audio"
  output_dir: "output"

# 文本处理配置
text:
  # 单个文本片段的最大字符数 (防止百炼API超限)
  max_chunk_length: 1000
  preserve_punctuation: true