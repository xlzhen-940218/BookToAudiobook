# DeepSeek API配置
# 注意：API密钥已移至单独的配置文件 api_keys.yaml 或环境变量 DEEPSEEK_API_KEY
deepseek:
  # api_key: "your-api-key-here"  # 已移至 api_keys.yaml
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"

# 阿里百炼 (DashScope) 语音合成配置
# 注意：API密钥建议配置在 api_keys.yaml 或环境变量 DASHSCOPE_API_KEY
dashscope:
  # api_key: "your-dashscope-api-key" # 已移至 api_keys.yaml
  model: "cosyvoice-v3-flash" # 阿里百炼最新的高并发/低延迟模型

# 语音合成配置
tts:
  # 默认音色（旁白）
  narrator_voice: "longanyang"  # 阳光大男孩，适合做旁白讲述

  # 角色音色配置
  character_voices:
    # 默认音色（当角色没有特定音色或随机分配时使用）
    default: "longanhuan"  # 欢脱元气女

    # 可以在这里添加特定角色的音色映射（优先级最高）
    # 例如: "张三": "longshu_v3"

    # 角色性别配置（用于音色选择）
    # 可以在这里添加特定角色的性别配置
    # 例如: "张三": "male", "李四": "female"
    character_genders: {}

    # 随机音色分配选项
    random_assignment: true  # 是否启用随机音色分配
    # 可用的中文音色列表（用于随机分配）- 使用阿里百炼的音色
    available_chinese_voices:
      - "longanyang"      # 男声，阳光大男孩（旁白默认）
      - "longanhuan"      # 女声，欢脱元气女
      - "longxiaochun_v3" # 女声，知性积极女
      - "longshu_v3"      # 男声，沉稳青年男
      - "longyichen_v3"   # 男声，洒脱活力男
      - "longwanjun_v3"   # 女声，细腻柔声女
      - "longxiaoxia_v3"  # 女声，沉稳权威女

    # 音色性别分类（用于自动分配）
    male_voices:
      - "longshu_v3"       # 沉稳青年男
      - "longyichen_v3"    # 洒脱活力男
      - "longjielidou_v3"  # 阳光顽皮男（少年音）
    female_voices:
      - "longanhuan"       # 欢脱元气女
      - "longxiaochun_v3"  # 知性积极女
      - "longwanjun_v3"    # 细腻柔声女
      - "longxiaoxia_v3"   # 沉稳权威女

# 音频处理配置
audio:
  output_format: "mp3"
  sample_rate: 24000
  bitrate: "48k"
  # 临时文件目录
  temp_dir: "temp_audio"
  # 最终输出目录
  output_dir: "output"

# 文本处理配置
text:
  # 最大文本长度（字符数）- 建议保持1000左右，百炼API对单次合成长度有一定限制
  max_chunk_length: 1000
  # 是否保留标点符号
  preserve_punctuation: true